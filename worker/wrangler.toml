# HP-Coach API — Hono on Cloudflare Workers
#
# Two environments: staging (default `wrangler dev`/`deploy --env staging`)
# and production. Each binds its own D1 + KV. R2 is created lazily later
# (parser output upload — task 32+).
#
# Secrets: `wrangler secret put CLERK_SECRET_KEY --env staging|production`.
# Local dev reads worker/.dev.vars (gitignored) for the same key.

name = "hpc-api"
main = "src/index.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

# ── Default (used by `wrangler dev`) ───────────────────────────────────
# Mirrors the staging env so local-dev shape matches staging shape.
[[d1_databases]]
binding = "DB"
database_name = "hpc-staging"
database_id = "0cb1f96a-e2c5-4fe3-bc31-4ebed514486f"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "d849e18f563d4029a64fd7149bba3da7"

# Strict-tier corpus (question bank + Layer 2 explanations) served
# auth-gated via /api/content. `wrangler dev` uses a local R2 simulation
# for this binding, but dev/e2e default to VITE_CONTENT_FROM_API unset,
# so the SPA fetches local /data + /explanations and never hits this
# binding locally. Present here so the worker type-checks and boots.
[[r2_buckets]]
binding = "CONTENT"
bucket_name = "hpc-content"

[vars]
ENVIRONMENT = "dev"

# Daily retention prune (04:00 UTC) — bounds the append-only attempts/
# sessions tables. Cron triggers don't inherit into named envs, so
# staging/production each declare their own below.
[triggers]
crons = ["0 4 * * *"]

# ── Staging ───────────────────────────────────────────────────────────
[env.staging]
name = "hpc-api-staging"

[env.staging.triggers]
crons = ["0 4 * * *"]

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "hpc-staging"
database_id = "0cb1f96a-e2c5-4fe3-bc31-4ebed514486f"
migrations_dir = "drizzle"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "d849e18f563d4029a64fd7149bba3da7"

[[env.staging.r2_buckets]]
binding = "CONTENT"
bucket_name = "hpc-content"

# ── Production ────────────────────────────────────────────────────────
[env.production]
name = "hpc-api"

[env.production.triggers]
crons = ["0 4 * * *"]

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "hpc-prod"
database_id = "4bba1c1c-8eb1-4988-b49c-33dd5a420848"
migrations_dir = "drizzle"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "942693e7fefb411898a55e3abcf17394"

[[env.production.r2_buckets]]
binding = "CONTENT"
bucket_name = "hpc-content"
