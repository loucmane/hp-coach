# Per-PR Pages preview deploys (service plan PR 0.1 v4, built 2026-07-15
# on the owner's ask: examine the REAL integrated app before merging —
# the numeral-bounce saga lived in product integration that no bake-off
# chip could show).
#
# Every PR gets `pr-<N>.hpc-app.pages.dev`, built with the STAGING
# config (staging worker API, dev Clerk instance — same auth as
# staging). Security posture mirrors deploy.yml: the pnpm-install build
# job never sees CLOUDFLARE_API_TOKEN; the deploy job never runs pnpm
# install (wrangler via pinned dlx only).
#
# NOTE: secrets are available here because PRs come from in-repo
# branches (solo owner). If fork PRs ever become a thing, gate this
# workflow on `github.event.pull_request.head.repo.full_name ==
# github.repository`.

name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  WRANGLER_VERSION: "4.42.0"

jobs:
  build:
    name: build preview (token-less)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # pnpm/action-setup@v4.0.0
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          run_install: false
      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install (app)
        run: pnpm install --frozen-lockfile
      - name: Install (worker — type-only dep of app build)
        working-directory: worker
        run: pnpm install --frozen-lockfile
      - name: Build (staging config)
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: ${{ vars.STAGING_API_URL }}
          # Sentry error capture — inert without the secret. See docs/sentry.md.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_CONTENT_FROM_API: ${{ vars.CONTENT_FROM_API }}
      # actions/upload-artifact@v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: app-dist-preview
          path: app/dist/
          retention-days: 3

  deploy:
    name: deploy preview
    needs: build
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2 (wrangler wants a cwd with wrangler.toml-adjacent context; harmless)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # pnpm/action-setup@v4.0.0
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          run_install: false
      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 22
      # actions/download-artifact@v4.1.8
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: app-dist-preview
          path: app/dist/
      - name: Deploy to Pages preview branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@${{ env.WRANGLER_VERSION }} pages deploy app/dist --project-name hpc-app --branch pr-${{ github.event.number }}
      - name: Comment the preview URL (once, then update)
        env:
          GH_TOKEN: ${{ github.token }}
          URL: https://pr-${{ github.event.number }}.hpc-app.pages.dev
        run: |
          MARKER="<!-- pr-preview-url -->"
          BODY="$MARKER
          Förhandsvisning: $URL (staging-API, uppdateras vid varje push)"
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" -f body="$BODY" >/dev/null
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" -f body="$BODY" >/dev/null
          fi
