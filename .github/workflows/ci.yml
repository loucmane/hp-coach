name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: app · typecheck · lint · test · build · e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install (app)
        run: pnpm install --frozen-lockfile

      # Worker deps are required for `app` typecheck — app/src/api/client.ts
      # imports `AppType` from ../../../worker/src/index for the typed hc()
      # client. The reference is type-only (nothing from worker bundles
      # into the SPA), but tsc walks the worker source and needs its
      # node_modules (hono, drizzle-orm, zod, @clerk/backend) to resolve.
      - name: Install (worker)
        working-directory: worker
        run: pnpm install --frozen-lockfile

      # The worker's wrangler dev server (started by Playwright's webServer
      # config in app/playwright.config.ts) reads CLERK_SECRET_KEY from
      # worker/.dev.vars to verify JWT tokens. The file is gitignored; in
      # CI we materialise it from the GitHub Actions secret so /api/*
      # routes can authenticate the test user. Without this the worker
      # 401s every API call and api/drill/mistakes e2e tests fail.
      - name: Write worker/.dev.vars
        working-directory: worker
        run: |
          cat > .dev.vars <<EOF
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e
        env:
          # Clerk dev-instance creds + the +clerk_test magic email used by
          # global-setup.ts to bootstrap a testing token and idempotently
          # create the E2E user. Set via `gh secret set` on this repo; the
          # local equivalent lives in app/.env.local (gitignored).
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14
