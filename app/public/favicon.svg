<?xml version="1.0" encoding="UTF-8"?>
<!-- HP-Coach favicon — the `⌜` corner-bracket brand mark (BrandMark.tsx)
     reduced to a 32×32 monogram. The bracket is drawn as a simple L-shape
     in dark ink on the sand background that matches the Sage palette. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#f5efe0"/>
  <path d="M 8 8 L 8 20 M 8 8 L 20 8" stroke="#1f1b17" stroke-width="3" stroke-linecap="square" fill="none"/>
</svg>
