<?xml version="1.0" encoding="UTF-8"?>
<!-- Apple touch icon — 180×180 home-screen install icon for iOS.
     Same corner-bracket monogram as the favicon, but proportionally
     scaled with room for the HP-COACH wordmark under it. iOS rounds
     the corners and adds its own shadow, so we leave the square. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" fill="#f5efe0"/>
  <path d="M 45 45 L 45 115 M 45 45 L 115 45" stroke="#1f1b17" stroke-width="14" stroke-linecap="square" fill="none"/>
  <text x="90" y="158" font-family="'Newsreader','Times New Roman',serif" font-size="22" font-weight="500" text-anchor="middle" fill="#1f1b17" letter-spacing="3.5">HP-COACH</text>
</svg>
