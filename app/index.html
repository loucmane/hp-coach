    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&family=Instrument+Serif&family=DM+Sans:wght@400;500;700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>HP-Coach — träna för högskoleprovet</title>
    <script>
      // Anti-FOUC: read the persisted UI store and toggle the .dark class
      // before React paints. The CSS file ships Sand-light defaults; we
      // only need to flip dark-mode here to avoid the brief flash of light
      // surfaces under a user who picked dark. Full palette/font/density
      // application is a single render away once React mounts.
      try {
        var raw = localStorage.getItem('hpc-ui')
        if (raw) {
          var s = JSON.parse(raw)
          var mode = s && s.state && s.state.mode
          if (mode === 'dark') {
            document.documentElement.classList.add('dark')
            document.documentElement.style.colorScheme = 'dark'
          }
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
